{% extends "base.html" %}

{% block title %}Редактирование товара — Lafufu store ✿{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body p-4">
                <span class="card-label mb-2">🪄 Редактирование</span>
                <h1 class="h3 mb-3">Редактировать товар</h1>
                <form action="/products/{{ product.id }}/edit" method="post" enctype="multipart/form-data" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Название</label>
                        <input type="text" name="title" class="form-control" value="{{ product.title }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="6" required>{{ product.description }}</textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Цена</label>
                        <input type="number" name="price" step="0.01" min="0" class="form-control" value="{{ product.price }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Новое фото</label>
                        <input type="file" name="image" accept="image/*" class="form-control">
                    </div>

                    {% if product.image_filename %}
                        <div class="col-12">
                            <div class="mb-2">
                                <img src="{{ url_for('static', path='uploads/' + product.image_filename) }}" alt="{{ product.title }}" class="img-fluid rounded-4 border" style="max-height: 280px; object-fit: cover;">
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="1" id="remove_image" name="remove_image">
                                <label class="form-check-label" for="remove_image">
                                    Удалить текущее фото
                                </label>
                            </div>
                        </div>
                    {% endif %}

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        <a href="/products/{{ product.id }}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
