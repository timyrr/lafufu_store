<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lafufu store{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg pink-navbar shadow-sm mb-4">
    <div class="container">
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <a class="navbar-brand fw-bold mb-0" href="/">Lafufu store ✿</a>
            <span class="site-badge">only original</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            {% if current_user %}
                <a href="/profile" class="btn btn-outline-primary btn-sm">Мой кабинет</a>
                <span class="small hero-subtitle">Привет, <strong>{{ current_user.display_name }}</strong> (@{{ current_user.username }})</span>
                <form action="/logout" method="post">
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Выйти</button>
                </form>
            {% else %}
                <a href="/login" class="btn btn-outline-primary btn-sm">Войти</a>
                <a href="/register" class="btn btn-primary btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% block content %}{% endblock %}
</main>
</body>
</html>
