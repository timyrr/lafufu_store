{% extends "base.html" %}

{% block title %}Регистрация — Lafufu store ✿{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Создай свой милый магазинчик</h1>
                <p class="text-muted">После регистрации ты сможешь публиковать свои товары и общаться с покупателями.</p>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="/register" method="post" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Отображаемое имя</label>
                        <input type="text" name="display_name" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Контакт для покупателей</label>
                        <input type="text" name="contact_info" class="form-control" placeholder="Телефон, email или Telegram" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Повтори пароль</label>
                        <input type="password" name="password_confirm" class="form-control" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
                    </div>
                </form>
                <p class="mt-3 mb-0 small text-muted">Уже есть аккаунт? <a href="/login">Войти</a>.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
